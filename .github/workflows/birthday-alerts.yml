name: Birthday & Anniversary Alerts

on:
  schedule:
    # Runs at 9:30 AM IST (4:00 AM UTC) daily
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      manual_recipient:
        description: 'Send to specific email (leave blank for default)'
        required: false
        type: string

jobs:
  send-alerts:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Install dependencies
        run: npm install googleapis @emailjs/nodejs
      
      - name: Run birthday alerts
        run: node birthday-alerts.js
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          EMAILJS_SERVICE_ID: ${{ secrets.EMAILJS_SERVICE_ID }}
          EMAILJS_TEMPLATE_ID: ${{ secrets.EMAILJS_TEMPLATE_ID }}
          EMAILJS_PUBLIC_KEY: ${{ secrets.EMAILJS_PUBLIC_KEY }}
          EMAILJS_PRIVATE_KEY: ${{ secrets.EMAILJS_PRIVATE_KEY }}
          MANUAL_RECIPIENT: ${{ github.event.inputs.manual_recipient }}
