name: Daily Intelligence Report

on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-22.04  # Use older Ubuntu for better compatibility
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '18.17.0'  # Specific version known to work
      
      - name: Install dependencies
        run: |
          npm install firebase-admin@11.11.1
          npm install google-auth-library@8.9.0
      
      - name: Run report
        run: NODE_OPTIONS='--openssl-legacy-provider' FORCE_RUN=true node send-daily-email.js
        env:
          EMAILJS_SERVICE_ID: ${{ secrets.EMAILJS_SERVICE_ID }}
          EMAILJS_TEMPLATE_ID: ${{ secrets.EMAILJS_TEMPLATE_ID }}
          EMAILJS_PUBLIC_KEY: ${{ secrets.EMAILJS_PUBLIC_KEY }}
          EMAILJS_PRIVATE_KEY: ${{ secrets.EMAILJS_PRIVATE_KEY }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
