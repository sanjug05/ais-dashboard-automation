name: Daily Email Report

on:
  schedule:
    # Runs at 9:00 AM IST (3:30 AM UTC) daily
    - cron: '30 3 * * *'
  workflow_dispatch:  # Allows manual trigger from GitHub UI
    inputs:
      manual_recipient:
        description: 'Send to specific email (leave blank for default)'
        required: false
        type: string

env:
  # Force actions to run with Node 24 (removes deprecation warning)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  send-report:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'   # Your script itself can still run on Node 20
      
      - name: Install EmailJS
        run: npm install @emailjs/browser
      
      - name: Send Daily Email Report
        run: |
          node send-daily-email.js
        env:
          EMAILJS_SERVICE_ID: ${{ secrets.EMAILJS_SERVICE_ID }}
          EMAILJS_TEMPLATE_ID: ${{ secrets.EMAILJS_TEMPLATE_ID }}
          EMAILJS_PUBLIC_KEY: ${{ secrets.EMAILJS_PUBLIC_KEY }}
          MANUAL_RECIPIENT: ${{ github.event.inputs.manual_recipient }}
